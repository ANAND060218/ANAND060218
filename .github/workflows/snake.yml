name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ANAND060218
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
4. Click **"Commit changes"**

---

### Step 3 — Enable write permissions ❗ (most missed step)
1. In your repo → click **Settings**
2. Left sidebar → **Actions** → **General**
3. Scroll down to **"Workflow permissions"**
4. Select **"Read and write permissions"**
5. Click **Save**

---

### Step 4 — Run it manually NOW
1. Click the **Actions** tab in your repo
2. You'll see **"Generate Snake"** on the left — click it
3. Click the **"Run workflow"** dropdown button on the right
4. Click the green **"Run workflow"** button
5. Wait about **60 seconds** ⏳

---

### Step 5 — Verify it worked
Go to: `https://github.com/ANAND060218/ANAND060218/tree/output`

You should see these two files:
```
github-contribution-grid-snake.svg
github-contribution-grid-snake-dark.svg
